# Mango default configuration.
# The service requires at least an orchestrator and a worker agent.
# Fill in provider, model, and api_key for each agent below — either
# interactively during `install.sh`, via `mango config agent edit`, or
# by editing this file directly.
#
# All runtime files live under MANGO_DIR (default: ~/.mango).
# Agent definitions: MANGO_DIR/agents/   Skill definitions: MANGO_DIR/skills/

agents:
  - name: orchestrator
    role: orchestrator
    max_tokens: 32768
    llm:
      provider: ""
      model: ""
      api_key: ""

  - name: worker
    skills: []
    max_tokens: 65536
    llm:
      provider: ""
      model: ""
      api_key: ""
