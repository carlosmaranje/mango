# Mango default configuration.
# The service requires at least an orchestrator and a worker agent.
# Fill in provider, model, and api_key for each agent below — either
# interactively during `install.sh`, via `mango config agent edit`, or
# by editing this file directly.
#
# Agent definition files live under MANGO_AGENTS_DIR (default:
# /etc/mango/agents/). Run `mango agent create <name>` to scaffold one.
# Skill files live under MANGO_SKILLS_DIR (default: /etc/mango/skills/).

agents:
  - name: orchestrator
    work_dir: /var/lib/mango/agents/orchestrator
    role: orchestrator
    llm:
      provider: ""
      model: ""
      api_key: ""

  - name: worker
    work_dir: /var/lib/mango/agents/worker
    skills: []
    llm:
      provider: ""
      model: ""
      api_key: ""
