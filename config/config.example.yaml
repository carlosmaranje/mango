socket_path: /var/run/mango/mango.sock

# Agent definitions are loaded from MANGO_AGENTS_DIR (default: /etc/mango/agents/).
# Skill definitions are loaded from MANGO_SKILLS_DIR (default: /etc/mango/skills/).
# Each agent's effective system prompt is assembled at startup by reading
# <agents_dir>/<NAME>.md then appending every skill .md listed under `skills:`
# (in order), separated by "\n\n---\n\n".

discord:
  token: "${DISCORD_TOKEN}"

agents:
  - name: orchestrator
    role: orchestrator
    work_dir: /var/lib/mango/agents/orchestrator
    llm:
      provider: anthropic
      model: claude-sonnet-4-20250514
      api_key: "${ANTHROPIC_API_KEY}"

  - name: researcher
    work_dir: /var/lib/mango/agents/researcher
    skills:
      - web_search
    llm:
      provider: ollama
      model: llama3.2

  - name: coder
    work_dir: /var/lib/mango/agents/coder
    skills:
      - code_execution
      - web_search
    llm:
      provider: openai-compatible
      model: qwen2.5-coder
      base_url: http://localhost:11434/v1
      api_key: "${CODER_API_KEY}"

bindings:
  - channel_id: "123456789"
    agent: researcher
  - channel_id: "987654321"
    agent: coder
