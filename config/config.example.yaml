# All runtime files (socket, config, agents, skills, memory) live under
# MANGO_DIR (default: ~/.mango). Override by setting MANGO_DIR=/your/path.
#
# Agent definitions: MANGO_DIR/agents/<NAME>.md
# Skill definitions: MANGO_DIR/skills/<name>.md
# Each agent's system prompt is assembled at startup by reading its .md then
# appending every skill .md listed under `skills:` (separated by "\n\n---\n\n").

discord:
  token: "${DISCORD_TOKEN}"

agents:
  - name: orchestrator
    role: orchestrator
    max_tokens: 32768
    llm:
      provider: anthropic
      model: claude-sonnet-4-20250514
      api_key: "${ANTHROPIC_API_KEY}"

  - name: researcher
    skills:
      - web_search
    max_tokens: 65536
    llm:
      provider: ollama
      model: llama3.2

  - name: coder
    skills:
      - code_execution
      - web_search
    max_tokens: 65536
    llm:
      provider: openai-compatible
      model: qwen2.5-coder
      base_url: http://localhost:11434/v1
      api_key: "${CODER_API_KEY}"

bindings:
  - channel_id: "123456789"
    agent: researcher
  - channel_id: "987654321"
    agent: coder
